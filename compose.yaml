x-gpu-all: &gpu-all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["0", "1"] # RTX 4060 + RTX 3070 Ti(役割はプロセス内でデバイス名マッチ)
            capabilities: [gpu]

services:
  # Phase 1: Genesis 2GPU学習(collector=3070Ti / learner=4060)
  train:
    build: .
    image: anduril-genesis-rl
    container_name: genesis-train
    <<: *gpu-all
    shm_size: "8gb" # torch.multiprocessing の共有テンソルキュー用
    ipc: host
    environment:
      - PYTHONUNBUFFERED=1
      - PYOPENGL_PLATFORM=egl
    volumes:
      - .:/app
      - ./checkpoints:/app/checkpoints
      - torch-cache:/root/.cache/torch # resnet18 重みの永続化
      - genesis-cache:/root/.cache/genesis # taichi カーネルキャッシュ
      - taichi-cache:/root/.cache/ti
      - uv-cache:/root/.cache/uv
    restart: unless-stopped
    command:
      ["uv", "run", "python", "-m", "genesis_rl.scripts.train",
       "--config", "configs/train.yaml", "--resume", "auto"]

  # 学習前のコース確認: course_preview.mp4 を生成して終了
  preview:
    image: anduril-genesis-rl
    build: .
    <<: *gpu-all
    shm_size: "2gb"
    environment:
      - PYTHONUNBUFFERED=1
      - PYOPENGL_PLATFORM=egl
    volumes:
      - .:/app
      - torch-cache:/root/.cache/torch
      - genesis-cache:/root/.cache/genesis
      - taichi-cache:/root/.cache/ti
      - uv-cache:/root/.cache/uv
    profiles: ["tools"]
    command:
      ["uv", "run", "python", "-m", "genesis_rl.scripts.preview",
       "--out", "checkpoints/course_preview.mp4"]

  tensorboard:
    image: anduril-genesis-rl
    build: .
    ports: ["6006:6006"]
    volumes:
      - ./checkpoints:/app/checkpoints
      - uv-cache:/root/.cache/uv
    profiles: ["tools"]
    command:
      ["uv", "run", "tensorboard", "--logdir", "checkpoints/tb", "--host", "0.0.0.0"]

volumes:
  torch-cache: {}
  genesis-cache: {}
  taichi-cache: {}
  uv-cache: {}
