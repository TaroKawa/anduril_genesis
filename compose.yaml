x-gpu-all: &gpu-all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all # 8×A100-80GB を全公開(役割配分は configs/train.yaml の hw で指定)
            capabilities: [gpu]

services:
  # Phase 1: Genesis 多GPU学習(learner=GPU0 / collector=GPU1..7、Madrona batchレンダ)
  train:
    build: .
    image: anduril-genesis-rl
    container_name: genesis-train
    <<: *gpu-all
    shm_size: "128gb" # 7collector×大量envの共有テンソルキュー(torch.multiprocessing)。RAM 1.7TBのうち
    ipc: host
    cap_add: [SYS_PTRACE] # py-spyでのプロファイル用
    ulimits:
      memlock: -1 # ピン留めメモリ(GPU間のH2D/共有テンソル)の上限を外す
    environment:
      - PYTHONUNBUFFERED=1
      - PYOPENGL_PLATFORM=egl
      # 断片化緩和 + PyTorchキャッシュを積極解放(collectorでMadrona/quadrantsのcuMemAllocAsyncと
      # 同一GPUを共有するため、PyTorchが抱え込むとレンダ側がOOMする。GC閾値0.8で高水位時に返却)
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,garbage_collection_threshold:0.8
      # プロセス数(learner1+collector7=8)×スレッドで240コアを埋める。オーバーサブスクは避ける
      - OMP_NUM_THREADS=24
      - MKL_NUM_THREADS=24
      - LP_NUM_THREADS=8 # sequentialフォールバック時のllvmpipeスレッド数(batchでは未使用)
    volumes:
      - .:/app
      - ./checkpoints:/app/checkpoints
      - torch-cache:/root/.cache/torch # resnet18 重みの永続化
      - genesis-cache:/root/.cache/genesis # taichi カーネルキャッシュ
      - taichi-cache:/root/.cache/ti
      - uv-cache:/root/.cache/uv
    restart: unless-stopped
    command:
      ["uv", "run", "python", "-m", "genesis_rl.scripts.train",
       "--config", "configs/train.yaml", "--resume", "auto"]

  # 学習前のコース確認: course_preview.mp4 を生成して終了
  preview:
    image: anduril-genesis-rl
    build: .
    <<: *gpu-all
    shm_size: "2gb"
    environment:
      - PYTHONUNBUFFERED=1
      - PYOPENGL_PLATFORM=egl
    volumes:
      - .:/app
      - torch-cache:/root/.cache/torch
      - genesis-cache:/root/.cache/genesis
      - taichi-cache:/root/.cache/ti
      - uv-cache:/root/.cache/uv
    profiles: ["tools"]
    command:
      ["uv", "run", "python", "-m", "genesis_rl.scripts.preview",
       "--out", "checkpoints/course_preview.mp4"]

  # 本番シム(DCL)推論はDockerを使わずホストで実行する(genesis_rl/scripts/fly_dcl.py):
  #   UV_PROJECT_ENVIRONMENT=.venv-host uv run python -m genesis_rl.scripts.fly_dcl --ckpt ...
  # シムはWindowsの127.0.0.1へUDP送信するため、fly_dclがWindows側リレー
  # (genesis_rl/dcl/win_relay.py)をinterop経由で自動起動してWSLへ転送する。
  # ※Docker Desktopの公開ポートUDP転送は高レート映像でフローが恒久的に落ちるため使わない(実測)。

  tensorboard:
    image: anduril-genesis-rl
    build: .
    ports: ["6006:6006"]
    volumes:
      - ./checkpoints:/app/checkpoints
      - uv-cache:/root/.cache/uv
    profiles: ["tools"]
    command:
      ["uv", "run", "tensorboard", "--logdir", "checkpoints/tb", "--host", "0.0.0.0"]

volumes:
  torch-cache: {}
  genesis-cache: {}
  taichi-cache: {}
  uv-cache: {}
