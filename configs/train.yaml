# Phase 1: Genesis 2GPU学習の既定設定。genesis_rl/config.py のdataclassに対応。
env:
  num_envs: 128         # レンダ対象は16のまま(vecのゲート観測は幾何検出なので非レンダenvも有効)
  n_gates: 18
  course_seed: 0
  stage: 0              # カリキュラムが自動進級(curriculum.enabled: true)
  render:
    backend: auto       # batch(Madrona) -> 不可なら sequential へ自動フォールバック
    width: 320
    height: 180

sac:
  batch_size: 1024
  replay_capacity: 250000  # 履歴窓(K=6)分メモリが増えるため縮小(fp16で約3GB)
  n_step: 3
  success_ratio: 0.5
  burn_in_steps: 50000
  learn_start: 20000
  replay_ratio_cap: 8.0
  compile: true

curriculum:
  enabled: true
  window: 200
  thresholds: [0.7, 0.7, 0.7, 0.6, 0.5]  # 5境界(6ステージ: 直線/近接緩/緩/フル/プール/速度)
  rebuild_episodes: 1000  # 再構築1回≈10秒停止。頻度を下げてチャーンを削減
  seed_pool: 32
  resume_hi: 0.8        # 逆カリキュラム: 成功率0時の途中スポーン確率(→各stageの下限へ線形減衰)

run:
  mode: async           # 2GPU。デバッグは sync
  ckpt_dir: checkpoints
  eval_interval: 250000
  eval_video: true
  profile: true         # 一時的: collectorステップ内訳の計測(計測後falseに戻す)

hw:
  collector_gpu: "3070" # デバイス名の部分一致
  learner_gpu: "4060"
