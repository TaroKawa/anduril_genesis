# Phase 1: Genesis 学習設定。genesis_rl/config.py のdataclassに対応。
# ── 8×A100-80GB / 240コア / 1.7TB RAM プロファイル ──
#   learner=GPU0(専有・巨大replay) / collector=GPU1..7(各1本、Madrona batchレンダ)
#   コンシューマ2GPUに戻すには hw と env.num_envs / render.backend を元へ。
env:
  num_envs: 1536        # per collector。Madrona batchで全env一括GPUレンダ(GPUメモリ~55GB活用)
  n_gates: 18
  course_seed: 0
  stage: 0              # カリキュラムが自動進級(curriculum.enabled: true)
  render:
    backend: batch      # gs_madrona(genesis依存に同梱)。ネイティブLinuxで有効
    width: 320
    height: 180
    max_seq_envs: 8     # batch不可時(sequential)のフォールバック上限

sac:
  batch_size: 2548         # learner専有A100を活かす。大量の新鮮データ向けに1024→2048
  replay_capacity: 2500000 # GPU常駐replay(1遷移≈12KB → 約31GB@GPU0)。4M→2.5MでOOM回避(compile/CUDAで約24GB overheadがあり79GBに達していた)
  success_capacity: 500000 # RLPD成功バッファ(約6GB)
  n_step: 3
  success_ratio: 0.5
  burn_in_steps: 50000
  learn_start: 20000
  replay_ratio_cap: 8.0     # learnerのUTD上限(=過学習防止)。7collectorのデータ律速では通常この下で回る
  weight_sync_sec: 1.0      # collectorへactor重みを配る間隔。2.0→1.0で方策の鮮度を上げ探索を改善
  total_transitions: 500000000  # 学習予算(既定50M)。stage3→5まで学習を続けるため500Mに拡大
  compile: true
  encoder_chunk: 384        # DINOv2 forwardを384枚ずつに分割(num_envs=1536を4分割)。全env一括だと
                            # (N,3,224,224)の巨大activationでcollector GPUが80GB上限→OOMクラッシュ。
                            # 凍結エンコーダはサンプル独立なので出力は一括と厳密一致(学習挙動は不変)。

curriculum:
  enabled: true
  window: 200
  thresholds: [0.7, 0.7, 0.7, 0.6, 0.5]  # 5境界(6ステージ: 直線/近接緩/緩/フル/プール/速度)
  rebuild_episodes: 6000  # 全collector再起動を伴う=warmup空白。頻度を1000→6000に下げGPU稼働率を上げる
  seed_pool: 32
  resume_hi: 0.8        # 逆カリキュラム: 成功率0時の途中スポーン確率(→各stageの下限へ線形減衰)

run:
  mode: async           # 多GPU非同期。デバッグは sync
  ckpt_dir: checkpoints
  eval_interval: 250000
  eval_video: true
  profile: false        # collectorステップ内訳の計測(sync入りで少し遅くなる。調査時のみtrue)

hw:
  learner_gpu: 0                    # GPU index直接指定(A100は同名なので名前一致不可)
  collector_gpus: [1, 2, 3, 4, 5, 6, 7]  # collectorを配置するGPU
  num_collectors: 7                 # 総collector数(collector_gpusへround-robin=各1本)
